version: '3.8'

services:
  web:
    image: node:20-slim
    container_name: site_institucional
    restart: always
    working_dir: /app
    env_file:
      - .env.production
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    volumes:
      - .:/app
    command: sh -c "apt-get update && apt-get install -y openssl && node server.js"
    networks:
      - webnet

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - webnet

networks:
  webnet:
