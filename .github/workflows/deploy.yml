name: Build e Push Docker Image

on:
  push:
    branches: [main]

env:
  ACTIONS_STEP_DEBUG: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Diagnóstico do ambiente
        run: |
          echo "=== Node version ==="
          node --version || echo "node not found"
          echo "=== Docker version ==="
          docker --version
          echo "=== Disk space ==="
          df -h
          echo "=== Memory ==="
          free -h
          echo "=== Arquivos no contexto ==="
          ls -la
          echo "=== Package.json ==="
          cat package.json

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          build-args: |
            DATABASE_URL=postgresql://build:build@localhost:5432/build?schema=public
            DIRECT_URL=postgresql://build:build@localhost:5432/build?schema=public
            NEXTAUTH_SECRET=build-secret-placeholder
            NEXTAUTH_URL=http://localhost:3000
            NEXT_PUBLIC_BASE_URL=http://localhost:3000
            BLOB_READ_WRITE_TOKEN=placeholder
            NODE_ENV=production
